version: 2

project_name: kbrd

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c 'go run . completion bash > completions/kbrd.bash'
    - sh -c 'go run . completion zsh  > completions/kbrd.zsh'
    - sh -c 'go run . completion fish > completions/kbrd.fish'

builds:
  - id: kbrd
    main: .
    binary: kbrd
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X kbrd/model.Version=v{{ .Version }}

archives:
  - id: kbrd
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - completions/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: kbrd
    binaries: [kbrd]
    completions:
      bash: completions/kbrd.bash
      zsh: completions/kbrd.zsh
      fish: completions/kbrd.fish
    homepage: "https://github.com/up2jj/kbrd"
    description: "Terminal-based, keyboard-driven Kanban board"
    repository:
      owner: up2jj
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    # Strip the Gatekeeper quarantine flag so the unsigned binary runs on first launch.
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kbrd"]
