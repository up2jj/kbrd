# kbrd configuration

[display]
# column_width  = 32
# preview_lines = 3
# title_from_heading = false # use the first "# " heading as the card title
# theme         = "dark"    # "light" | "dark"

[notify]
# backend = "auto"          # auto | osascript | osc9 | osc777 | none

[board]
# name = ""                 # optional label shown in the board switcher

[git]
# diff_tool = "auto"        # auto | difft | diff-so-fancy | git
# auto_sync_interval = ""   # empty/"0" disables; e.g. "30s", "5m", "1h"
# generate_readme = false   # regenerate README.md from the board before each commit

[hooks]
# enabled    = true         # declarative YAML event hooks (hooks.yml / .kbrd_hooks.yml)
# timeout_ms = 2000         # per-hook command timeout; hooks run one at a time, in order

[mcp]
# enabled = false           # built-in MCP server; off by default (start with --mcp or enabled = true)
# addr    = "127.0.0.1:7777" # Streamable HTTP listen address

[template]
# exec               = false # allow {{shell}} in card templates to run commands (off by default;
#                            #   the command inherits kbrd's full environment — see SECURITY.md.
#                            #   Launch with `kbrd --safe` to force this and all scripting/hooks off)
# command_timeout_ms = 20000 # per-{{shell}} timeout

[serve]
# Options for `kbrd serve` (precedence: flag > env > this file > default).
# pull_interval and board.name hot-reload when this file is saved (or pulled);
# addr/domain are read at startup only — a change here needs a server restart.
# The access token is NEVER read from this file: use --token or KBRD_TOKEN
# (kbrd.toml is committed and pulled with the board repo).
# addr          = ":8080"   # plain-HTTP listen address (env KBRD_ADDR); ignored when domain is set
# domain        = ""        # public domain: enables Let's Encrypt TLS (env KBRD_DOMAIN)
# pull_interval = "60s"     # background git pull; "0" disables (env KBRD_PULL_INTERVAL)
