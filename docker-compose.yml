# Headless kbrd web server. Required env (e.g. in a .env file next to this):
#   KBRD_TOKEN  - web access token, min 12 chars (openssl rand -base64 24)
#   GIT_TOKEN   - fine-grained PAT scoped to the board repo, contents read/write
#   KBRD_DOMAIN - public domain for Let's Encrypt TLS; leave empty for plain
#                 HTTP on :8080 (local use / behind your own proxy)
services:
  kbrd:
    build: .
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080"   # plain-HTTP mode (no KBRD_DOMAIN)
    environment:
      KBRD_DOMAIN: ${KBRD_DOMAIN:-}
      KBRD_TOKEN: ${KBRD_TOKEN:?set KBRD_TOKEN}
      GIT_URL: "https://x-access-token:${GIT_TOKEN}@github.com/you/board.git"
      GIT_AUTHOR_NAME: kbrd-web
      GIT_AUTHOR_EMAIL: kbrd@example.com
      KBRD_PULL_INTERVAL: 60s
    volumes:
      # /board holds data/ (the clone) and certs/ (the Let's Encrypt cache);
      # both must survive restarts.
      - board-data:/board
    read_only: true
    healthcheck:
      # :80 answers /healthz in TLS mode; switch to :8080 in plain-HTTP mode.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 30s
    restart: unless-stopped

volumes:
  board-data:
